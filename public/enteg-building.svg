<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ca8d4"/>
      <stop offset="60%" stop-color="#b8d9ef"/>
      <stop offset="100%" stop-color="#ddeef8"/>
    </linearGradient>
    <linearGradient id="buildingMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8edf2"/>
      <stop offset="100%" stop-color="#c8d2dc"/>
    </linearGradient>
    <linearGradient id="buildingLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0bcc8"/>
      <stop offset="100%" stop-color="#c8d2dc"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ab8d4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4a8fc0" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="glassDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a8faf" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2a5f8f" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a9e7a"/>
      <stop offset="100%" stop-color="#6a7e5a"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a8490"/>
      <stop offset="100%" stop-color="#5a6470"/>
    </linearGradient>
    <linearGradient id="sign" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0f2540"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <clipPath id="buildingClip">
      <rect x="180" y="80" width="540" height="380"/>
    </clipPath>
  </defs>

  <!-- Sky -->
  <rect width="900" height="600" fill="url(#sky)"/>

  <!-- Clouds -->
  <ellipse cx="120" cy="90" rx="70" ry="28" fill="white" opacity="0.85"/>
  <ellipse cx="170" cy="78" rx="50" ry="22" fill="white" opacity="0.9"/>
  <ellipse cx="80" cy="96" rx="45" ry="18" fill="white" opacity="0.7"/>

  <ellipse cx="720" cy="70" rx="80" ry="26" fill="white" opacity="0.75"/>
  <ellipse cx="775" cy="58" rx="55" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="680" cy="76" rx="40" ry="16" fill="white" opacity="0.65"/>

  <!-- Ground / Lawn -->
  <rect x="0" y="440" width="900" height="160" fill="url(#ground)"/>

  <!-- Parking / road area -->
  <rect x="0" y="470" width="900" height="130" fill="url(#road)"/>

  <!-- Road markings -->
  <rect x="60" y="530" width="780" height="3" fill="white" opacity="0.3" rx="2"/>
  <rect x="200" y="545" width="40" height="3" fill="white" opacity="0.4" rx="2"/>
  <rect x="270" y="545" width="40" height="3" fill="white" opacity="0.4" rx="2"/>
  <rect x="340" y="545" width="40" height="3" fill="white" opacity="0.4" rx="2"/>
  <rect x="550" y="545" width="40" height="3" fill="white" opacity="0.4" rx="2"/>
  <rect x="620" y="545" width="40" height="3" fill="white" opacity="0.4" rx="2"/>

  <!-- Cars (simple) -->
  <!-- Car 1 -->
  <rect x="185" y="490" width="90" height="38" rx="6" fill="#c0392b" filter="url(#softShadow)"/>
  <rect x="195" y="480" width="70" height="22" rx="5" fill="#e74c3c"/>
  <ellipse cx="200" cy="530" rx="10" ry="10" fill="#222"/>
  <ellipse cx="265" cy="530" rx="10" ry="10" fill="#222"/>
  <ellipse cx="200" cy="530" rx="5" ry="5" fill="#888"/>
  <ellipse cx="265" cy="530" rx="5" ry="5" fill="#888"/>

  <!-- Car 2 -->
  <rect x="310" y="492" width="90" height="38" rx="6" fill="#2c3e50" filter="url(#softShadow)"/>
  <rect x="320" y="482" width="70" height="22" rx="5" fill="#34495e"/>
  <ellipse cx="325" cy="532" rx="10" ry="10" fill="#222"/>
  <ellipse cx="390" cy="532" rx="10" ry="10" fill="#222"/>
  <ellipse cx="325" cy="532" rx="5" ry="5" fill="#888"/>
  <ellipse cx="390" cy="532" rx="5" ry="5" fill="#888"/>

  <!-- Car 3 -->
  <rect x="560" y="491" width="90" height="38" rx="6" fill="#27ae60" filter="url(#softShadow)"/>
  <rect x="570" y="481" width="70" height="22" rx="5" fill="#2ecc71"/>
  <ellipse cx="575" cy="531" rx="10" ry="10" fill="#222"/>
  <ellipse cx="640" cy="531" rx="10" ry="10" fill="#222"/>
  <ellipse cx="575" cy="531" rx="5" ry="5" fill="#888"/>
  <ellipse cx="640" cy="531" rx="5" ry="5" fill="#888"/>

  <!-- Trees left -->
  <rect x="90" y="390" width="12" height="80" fill="#5a4020"/>
  <ellipse cx="96" cy="370" rx="38" ry="46" fill="#3a6e2a"/>
  <ellipse cx="96" cy="355" rx="28" ry="34" fill="#4a8e3a"/>

  <rect x="148" y="400" width="10" height="70" fill="#5a4020"/>
  <ellipse cx="153" cy="382" rx="32" ry="40" fill="#3a6e2a"/>
  <ellipse cx="153" cy="368" rx="24" ry="30" fill="#4a8e3a"/>

  <!-- Trees right -->
  <rect x="760" y="390" width="12" height="80" fill="#5a4020"/>
  <ellipse cx="766" cy="370" rx="38" ry="46" fill="#3a6e2a"/>
  <ellipse cx="766" cy="355" rx="28" ry="34" fill="#4a8e3a"/>

  <rect x="812" y="400" width="10" height="70" fill="#5a4020"/>
  <ellipse cx="817" cy="382" rx="32" ry="40" fill="#3a6e2a"/>
  <ellipse cx="817" cy="368" rx="24" ry="30" fill="#4a8e3a"/>

  <!-- ======================== MAIN BUILDING ======================== -->

  <!-- Building shadow on ground -->
  <ellipse cx="450" cy="455" rx="280" ry="18" fill="#000" opacity="0.12"/>

  <!-- Left wing -->
  <rect x="160" y="200" width="130" height="250" fill="url(#buildingLeft)" filter="url(#shadow)"/>
  <!-- Left wing glass strips -->
  <rect x="172" y="215" width="22" height="60" rx="2" fill="url(#glassDark)" opacity="0.9"/>
  <rect x="202" y="215" width="22" height="60" rx="2" fill="url(#glassDark)" opacity="0.9"/>
  <rect x="232" y="215" width="22" height="60" rx="2" fill="url(#glassDark)" opacity="0.9"/>
  <rect x="172" y="285" width="22" height="60" rx="2" fill="url(#glassDark)" opacity="0.9"/>
  <rect x="202" y="285" width="22" height="60" rx="2" fill="url(#glassDark)" opacity="0.9"/>
  <rect x="232" y="285" width="22" height="60" rx="2" fill="url(#glassDark)" opacity="0.9"/>
  <rect x="172" y="355" width="22" height="60" rx="2" fill="url(#glassDark)" opacity="0.9"/>
  <rect x="202" y="355" width="22" height="60" rx="2" fill="url(#glassDark)" opacity="0.9"/>
  <rect x="232" y="355" width="22" height="60" rx="2" fill="url(#glassDark)" opacity="0.9"/>

  <!-- Right wing -->
  <rect x="610" y="200" width="130" height="250" fill="url(#buildingMain)" filter="url(#shadow)"/>
  <!-- Right wing glass strips -->
  <rect x="622" y="215" width="22" height="60" rx="2" fill="url(#glass)" opacity="0.9"/>
  <rect x="652" y="215" width="22" height="60" rx="2" fill="url(#glass)" opacity="0.9"/>
  <rect x="682" y="215" width="22" height="60" rx="2" fill="url(#glass)" opacity="0.9"/>
  <rect x="622" y="285" width="22" height="60" rx="2" fill="url(#glass)" opacity="0.9"/>
  <rect x="652" y="285" width="22" height="60" rx="2" fill="url(#glass)" opacity="0.9"/>
  <rect x="682" y="285" width="22" height="60" rx="2" fill="url(#glass)" opacity="0.9"/>
  <rect x="622" y="355" width="22" height="60" rx="2" fill="url(#glass)" opacity="0.9"/>
  <rect x="652" y="355" width="22" height="60" rx="2" fill="url(#glass)" opacity="0.9"/>
  <rect x="682" y="355" width="22" height="60" rx="2" fill="url(#glass)" opacity="0.9"/>

  <!-- Main center building -->
  <rect x="270" y="80" width="360" height="370" fill="url(#buildingMain)" filter="url(#shadow)"/>

  <!-- Center building horizontal dividers -->
  <rect x="270" y="150" width="360" height="4" fill="#b0bac8" opacity="0.6"/>
  <rect x="270" y="220" width="360" height="4" fill="#b0bac8" opacity="0.6"/>
  <rect x="270" y="290" width="360" height="4" fill="#b0bac8" opacity="0.6"/>
  <rect x="270" y="360" width="360" height="4" fill="#b0bac8" opacity="0.6"/>

  <!-- Center building glass facade (large curtain wall) -->
  <!-- Row 1 windows -->
  <rect x="285" y="95" width="48" height="48" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="341" y="95" width="48" height="48" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="397" y="95" width="48" height="48" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="453" y="95" width="48" height="48" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="509" y="95" width="48" height="48" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="565" y="95" width="48" height="48" rx="3" fill="url(#glass)" opacity="0.85"/>
  <!-- Reflections row 1 -->
  <rect x="290" y="100" width="15" height="36" rx="2" fill="white" opacity="0.2"/>
  <rect x="346" y="100" width="15" height="36" rx="2" fill="white" opacity="0.2"/>
  <rect x="402" y="100" width="15" height="36" rx="2" fill="white" opacity="0.2"/>
  <rect x="458" y="100" width="15" height="36" rx="2" fill="white" opacity="0.2"/>
  <rect x="514" y="100" width="15" height="36" rx="2" fill="white" opacity="0.2"/>
  <rect x="570" y="100" width="15" height="36" rx="2" fill="white" opacity="0.2"/>

  <!-- Row 2 windows -->
  <rect x="285" y="160" width="48" height="52" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="341" y="160" width="48" height="52" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="397" y="160" width="48" height="52" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="453" y="160" width="48" height="52" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="509" y="160" width="48" height="52" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="565" y="160" width="48" height="52" rx="3" fill="url(#glass)" opacity="0.85"/>

  <!-- Row 3 windows -->
  <rect x="285" y="232" width="48" height="50" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="341" y="232" width="48" height="50" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="397" y="232" width="48" height="50" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="453" y="232" width="48" height="50" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="509" y="232" width="48" height="50" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="565" y="232" width="48" height="50" rx="3" fill="url(#glass)" opacity="0.85"/>

  <!-- Row 4 windows -->
  <rect x="285" y="302" width="48" height="50" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="341" y="302" width="48" height="50" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="453" y="302" width="48" height="50" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="509" y="302" width="48" height="50" rx="3" fill="url(#glass)" opacity="0.85"/>
  <rect x="565" y="302" width="48" height="50" rx="3" fill="url(#glass)" opacity="0.85"/>

  <!-- ======================== ENTEG SIGN ON BUILDING ======================== -->
  <!-- Sign background panel -->
  <rect x="370" y="308" width="160" height="42" rx="4" fill="url(#sign)" filter="url(#softShadow)"/>
  <rect x="372" y="310" width="156" height="38" rx="3" fill="#0f2540" opacity="0.95"/>
  <!-- Blue accent line on sign -->
  <rect x="372" y="310" width="4" height="38" rx="2" fill="#4A8FE0"/>

  <!-- ENTEG text on sign -->
  <text x="450" y="336" font-family="Arial Black, Helvetica, sans-serif" font-weight="900" font-size="22" fill="#4A8FE0" text-anchor="middle" letter-spacing="5" dominant-baseline="middle">ENTEG</text>
  <!-- Subtle glow/reflection on sign text -->
  <text x="450" y="336" font-family="Arial Black, Helvetica, sans-serif" font-weight="900" font-size="22" fill="white" text-anchor="middle" letter-spacing="5" dominant-baseline="middle" opacity="0.08">ENTEG</text>

  <!-- GmbH subtext -->
  <text x="450" y="356" font-family="Arial, sans-serif" font-size="7" fill="#8ab8d4" text-anchor="middle" letter-spacing="3" opacity="0.8">GmbH</text>

  <!-- ======================== ENTRANCE ======================== -->
  <!-- Entrance canopy -->
  <rect x="370" y="390" width="160" height="14" rx="3" fill="#b0bac8" filter="url(#softShadow)"/>
  <rect x="362" y="390" width="176" height="8" rx="2" fill="#c8d2dc"/>
  <!-- Canopy support columns -->
  <rect x="375" y="398" width="8" height="52" fill="#a0aab8"/>
  <rect x="517" y="398" width="8" height="52" fill="#a0aab8"/>

  <!-- Entrance door frame -->
  <rect x="390" y="380" width="120" height="70" rx="2" fill="#1a2a3a" opacity="0.9"/>
  <!-- Glass doors -->
  <rect x="394" y="382" width="54" height="66" rx="1" fill="url(#glass)" opacity="0.7"/>
  <rect x="452" y="382" width="54" height="66" rx="1" fill="url(#glass)" opacity="0.7"/>
  <!-- Door handles -->
  <rect x="444" y="412" width="4" height="16" rx="2" fill="#c8d2dc"/>
  <rect x="452" y="412" width="4" height="16" rx="2" fill="#c8d2dc"/>
  <!-- Door reflections -->
  <rect x="398" y="386" width="12" height="58" rx="1" fill="white" opacity="0.15"/>
  <rect x="456" y="386" width="12" height="58" rx="1" fill="white" opacity="0.15"/>

  <!-- ======================== ROOFTOP DETAILS ======================== -->
  <!-- Rooftop edge cap -->
  <rect x="268" y="76" width="364" height="8" rx="2" fill="#c0cad8"/>
  <!-- Antenna / flag pole -->
  <rect x="447" y="30" width="6" height="52" fill="#8a9ab0"/>
  <!-- Flag -->
  <polygon points="453,32 490,42 453,52" fill="#4A8FE0" opacity="0.9"/>

  <!-- AC units on roof -->
  <rect x="300" y="72" width="40" height="14" rx="3" fill="#a0aab8" opacity="0.8"/>
  <rect x="560" y="72" width="40" height="14" rx="3" fill="#a0aab8" opacity="0.8"/>
  <rect x="430" y="70" width="30" height="10" rx="2" fill="#b0bac8" opacity="0.6"/>

  <!-- ======================== ENTRANCE AREA ======================== -->
  <!-- Walkway / path -->
  <rect x="400" y="450" width="100" height="30" fill="#9aa4b0" opacity="0.8"/>
  <rect x="395" y="448" width="110" height="6" fill="#b0bac8"/>

  <!-- Hedges / low shrubs -->
  <rect x="300" y="445" width="80" height="16" rx="8" fill="#3a6e2a" opacity="0.9"/>
  <rect x="520" y="445" width="80" height="16" rx="8" fill="#3a6e2a" opacity="0.9"/>

  <!-- Small company sign at entrance -->
  <rect x="348" y="430" width="8" height="30" fill="#6a7a8a"/>
  <rect x="336" y="420" width="32" height="22" rx="2" fill="#0f2540"/>
  <text x="352" y="434" font-family="Arial Black, sans-serif" font-weight="900" font-size="7" fill="#4A8FE0" text-anchor="middle" letter-spacing="1">ENTEG</text>

  <!-- Lamp post left -->
  <rect x="232" y="395" width="5" height="60" fill="#5a6a7a"/>
  <ellipse cx="234" cy="392" rx="12" ry="6" fill="#c8d080" opacity="0.8"/>
  <rect x="228" y="390" width="12" height="5" rx="2" fill="#8a9a6a"/>

  <!-- Lamp post right -->
  <rect x="663" y="395" width="5" height="60" fill="#5a6a7a"/>
  <ellipse cx="665" cy="392" rx="12" ry="6" fill="#c8d080" opacity="0.8"/>
  <rect x="659" y="390" width="12" height="5" rx="2" fill="#8a9a6a"/>

  <!-- Subtle vignette overlay -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.22)"/>
  </radialGradient>
  <rect width="900" height="600" fill="url(#vignette)"/>
</svg>
