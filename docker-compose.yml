version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enteg-app
    networks:
      - enteg-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: enteg-nginx
    ports:
      - "3007:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - enteg-network
    restart: unless-stopped

networks:
  enteg-network:
    driver: bridge
